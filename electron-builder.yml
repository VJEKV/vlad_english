appId: com.vlad-english.app
productName: VladEnglish
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VladEnglish
